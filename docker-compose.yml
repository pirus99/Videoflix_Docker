# ============================================
# NETWORKS
# ============================================
networks:
  traefik-public:
    external: true
  internal:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    name: ${PROJECT_NAME}_postgres_data
  backend_media:
    name: ${PROJECT_NAME}_backend_media
  backend_static:
    name: ${PROJECT_NAME}_backend_static
  traefik_certs:
    name: ${PROJECT_NAME}_traefik_certs

# ============================================
# SERVICES
# ============================================
services:
  # ------------------------------------------
  # Traefik Reverse Proxy
  # ------------------------------------------
  traefik:
    image: traefik:latest
    container_name: ${PROJECT_NAME}_traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik-public
      - internal
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=${TZ:-UTC}
    command:
      # API and dashboard
      - "--api.dashboard=${TRAEFIK_DASHBOARD:-false}"
      - "--api.insecure=false"
      
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--providers.docker.constraints=Label(`traefik.constraint-label`,`${PROJECT_NAME}`)"
      
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      
      # SSL/TLS with Let's Encrypt (controlled by LETSENCRYPT_CERTRESOLVER in .env)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=${LETSENCRYPT_CA_SERVER:-}"
      
      # Logs
      - "--log.level=INFO"
      - "--accesslog=true"
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=${PROJECT_NAME}"
      
      # Dashboard (if enabled)
      - "traefik.http.routers.${PROJECT_NAME}-traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-traefik-dashboard.service=api@internal"
      - "traefik.http.routers.${PROJECT_NAME}-traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-traefik-dashboard.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"
      
      # Basic auth for dashboard (optional)
      # Generate with: echo $(htpasswd -nb admin password) | sed -e s/\\$/\\$\\$/g
      # - "traefik.http.routers.${PROJECT_NAME}-traefik-dashboard.middlewares=auth"
      # - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$8evjzm1c$$M6ClqW8hHQB8YHRGvF06g."

  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}_db
    restart: unless-stopped
    networks:
      - internal
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Django Backend
  # ------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        REPO_URL: ${BACKEND_REPO_URL}
        BRANCH: ${BACKEND_BRANCH:-main}
    container_name: ${PROJECT_NAME}_backend
    restart: unless-stopped
    networks:
      - traefik-public
      - internal
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Django settings
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=${POSTGRES_HOST:-db}
      - DB_PORT=${POSTGRES_PORT:-5432}
      
      # Email
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_LIFETIME=${JWT_ACCESS_TOKEN_LIFETIME:-60}
      - JWT_REFRESH_TOKEN_LIFETIME=${JWT_REFRESH_TOKEN_LIFETIME:-1440}
      
      # Superuser (optional)
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      
      # Timezone
      - TZ=${TZ:-UTC}
      
      # Gunicorn configuration (optional)
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=${PROJECT_NAME}"
      
      # API Router
      - "traefik.http.routers.${PROJECT_NAME}-backend-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${PROJECT_NAME}-backend-api.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-backend-api.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"
      - "traefik.http.services.${PROJECT_NAME}-backend-api.loadbalancer.server.port=8000"
      
      # Admin Router
      - "traefik.http.routers.${PROJECT_NAME}-backend-admin.rule=Host(`${DOMAIN}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.${PROJECT_NAME}-backend-admin.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-backend-admin.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"
      
      # Media Router
      - "traefik.http.routers.${PROJECT_NAME}-backend-media.rule=Host(`${DOMAIN}`) && PathPrefix(`/media`)"
      - "traefik.http.routers.${PROJECT_NAME}-backend-media.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-backend-media.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"
      
      # Static Router
      - "traefik.http.routers.${PROJECT_NAME}-backend-static.rule=Host(`${DOMAIN}`) && PathPrefix(`/static`)"
      - "traefik.http.routers.${PROJECT_NAME}-backend-static.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-backend-static.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"

  # ------------------------------------------
  # Frontend (Nginx)
  # ------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REPO_URL: ${FRONTEND_REPO_URL}
        BRANCH: ${FRONTEND_BRANCH:-main}
    container_name: ${PROJECT_NAME}_frontend
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      - TZ=${TZ:-UTC}
      - VITE_API_URL=${VITE_API_URL}
      - API_BASE_URL=${API_BASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=${PROJECT_NAME}"
      
      # Frontend Router (catch-all for remaining paths)
      - "traefik.http.routers.${PROJECT_NAME}-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-frontend.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-frontend.tls.certresolver=${LETSENCRYPT_CERTRESOLVER:-}"
      - "traefik.http.services.${PROJECT_NAME}-frontend.loadbalancer.server.port=80"
      
      # Priority (lower than backend routes)
      - "traefik.http.routers.${PROJECT_NAME}-frontend.priority=1"
